<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Usman Holdings">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d98a"/>
      <stop offset="0.5" stop-color="#cda049"/>
      <stop offset="1" stop-color="#8a6a1f"/>
    </linearGradient>
  </defs>
  <!-- laurel branches -->
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round">
    <path d="M60 60 C30 80 28 120 52 150"/>
    <path d="M140 60 C170 80 172 120 148 150"/>
  </g>
  <g fill="url(#g)">
    <!-- laurel leaves left -->
    <ellipse cx="42" cy="82" rx="6" ry="3" transform="rotate(-35 42 82)"/>
    <ellipse cx="36" cy="100" rx="6" ry="3" transform="rotate(-10 36 100)"/>
    <ellipse cx="37" cy="120" rx="6" ry="3" transform="rotate(20 37 120)"/>
    <ellipse cx="44" cy="138" rx="6" ry="3" transform="rotate(45 44 138)"/>
    <!-- laurel leaves right -->
    <ellipse cx="158" cy="82" rx="6" ry="3" transform="rotate(35 158 82)"/>
    <ellipse cx="164" cy="100" rx="6" ry="3" transform="rotate(10 164 100)"/>
    <ellipse cx="163" cy="120" rx="6" ry="3" transform="rotate(-20 163 120)"/>
    <ellipse cx="156" cy="138" rx="6" ry="3" transform="rotate(-45 156 138)"/>
    <!-- bull head crest on top -->
    <path d="M100 26 c-10 0 -18 -8 -26 -12 c4 8 2 16 -2 20 c8 -2 14 2 18 8 c-4 4 -6 10 -6 14 c6 -6 10 -8 16 -8 s10 2 16 8 c0 -4 -2 -10 -6 -14 c4 -6 10 -12 18 -8 c-4 -4 -6 -12 -2 -20 c-8 4 -16 12 -26 12 z"/>
    <!-- shield -->
    <path d="M100 58 L150 74 L150 118 C150 148 128 166 100 176 C72 166 50 148 50 118 L50 74 Z" fill="#0b1e39" stroke="url(#g)" stroke-width="4"/>
  </g>
  <!-- UH monogram -->
  <text x="100" y="132" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="56" font-weight="700" fill="url(#g)">UH</text>
